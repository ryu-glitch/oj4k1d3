<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RYU — Access</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap">
  <style>
    *, *::before, *::after {
      margin: 0; padding: 0; box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: #000;
    }
    canvas#bg {
      position: fixed; inset: 0; z-index: 0;
      display: block;
    }

    .wrap {
      position: relative; z-index: 10;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 20px;
    }

    .card {
      width: 380px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.10);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-radius: 16px;
      padding: 40px 36px 36px;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.04) inset,
        0 20px 60px rgba(0,0,0,0.7),
        0 0 120px rgba(80,0,180,0.08);
    }

    .logo {
      text-align: center;
      margin-bottom: 28px;
    }
    .logo-text {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 10px;
      color: #fff;
      text-transform: uppercase;
    }
    .logo-sub {
      font-size: 10px;
      color: rgba(255,255,255,0.35);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-top: 2px;
    }

    .divider {
      width: 40px; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      margin: 0 auto 28px;
    }

    .field-wrap {
      position: relative;
      margin-bottom: 16px;
    }
    .field-wrap input {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      padding: 14px 44px 14px 16px;
      font-size: 13px;
      color: #fff;
      outline: none;
      letter-spacing: 1px;
      transition: border-color .2s, background .2s;
      font-family: 'Courier New', monospace;
    }
    .field-wrap input::placeholder {
      color: rgba(255,255,255,0.25);
      font-family: 'Poppins', sans-serif;
      letter-spacing: 0;
      font-size: 13px;
    }
    .field-wrap input:focus {
      border-color: rgba(160,100,255,0.5);
      background: rgba(255,255,255,0.07);
    }
    .toggle-eye {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      cursor: pointer; background: none; border: none; outline: none; padding: 0;
      color: rgba(255,255,255,0.3);
      font-size: 14px; line-height: 1;
      transition: color .2s;
      user-select: none;
    }
    .toggle-eye:hover { color: rgba(255,255,255,0.7); }

    .error-msg {
      background: rgba(220,50,50,0.12);
      border: 1px solid rgba(220,50,50,0.25);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 12px;
      color: #ff7070;
      margin-bottom: 16px;
      text-align: center;
    }

    .btn-login {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: none; outline: none; cursor: pointer;
      font-size: 13px; font-weight: 600;
      letter-spacing: 2px; text-transform: uppercase;
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      color: #fff;
      box-shadow: 0 4px 24px rgba(100,50,220,0.35);
      transition: opacity .2s, transform .1s, box-shadow .2s;
      margin-top: 8px;
    }
    .btn-login:hover { opacity: .9; box-shadow: 0 6px 30px rgba(100,50,220,0.5); }
    .btn-login:active { transform: scale(.98); }
    .btn-login:disabled { opacity: .5; cursor: not-allowed; }

    .footer-note {
      text-align: center;
      margin-top: 24px;
      font-size: 10px;
      color: rgba(255,255,255,0.18);
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

<canvas id="bg"></canvas>

<div class="wrap">
  <div class="card">
    <div class="logo">
      <div class="logo-text">NEXUS</div>
      <div class="logo-sub">Secure Access</div>
    </div>
    <div class="divider"></div>

    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}

    <form id="login-form" method="POST" action="/login" autocomplete="off">
      <input type="hidden" name="nonce" id="nonce-field" value="{{ nonce }}">
      <div class="field-wrap">
        <input
          type="password"
          id="key-input"
          name="key"
          placeholder="Enter access key  RYU-XXXX-XXXX-XXXX"
          autocomplete="off"
          spellcheck="false"
          required
        >
        <button type="button" class="toggle-eye" id="toggle-eye" title="Show/hide key">
          &#128065;
        </button>
      </div>
      <button type="submit" class="btn-login" id="submit-btn">Enter</button>
    </form>

    <div class="footer-note">Access restricted &nbsp;·&nbsp; Authorised users only</div>
  </div>
</div>

<script>
  /* ─── Toggle show/hide ─── */
  const keyInput = document.getElementById('key-input');
  const toggleEye = document.getElementById('toggle-eye');
  toggleEye.addEventListener('click', () => {
    const hide = keyInput.type === 'password';
    keyInput.type = hide ? 'text' : 'password';
    toggleEye.innerHTML = hide ? '&#128064;' : '&#128065;';
  });

  /* ─── Auto-format key as user types ─── */
  keyInput.addEventListener('input', () => {
    let v = keyInput.value.toUpperCase().replace(/[^A-Z0-9\-]/g, '');
    if (v.startsWith('RYU')) {
      keyInput.value = v.slice(0, 19);
    }
  });

  /* ─── Submit feedback ─── */
  document.getElementById('login-form').addEventListener('submit', () => {
    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = 'Verifying...';
  });

  /* ─── Nonce auto-refresh every 4 minutes ─── */
  function refreshNonce() {
    fetch('/nonce')
      .then(r => r.json())
      .then(d => {
        if (d.nonce) document.getElementById('nonce-field').value = d.nonce;
      })
      .catch(() => {});
  }
  setInterval(refreshNonce, 4 * 60 * 1000);

  /* ══════════════════════════════════════════════════════
     BLACK HOLE + STAR FIELD CANVAS ANIMATION
  ══════════════════════════════════════════════════════ */
  const canvas = document.getElementById('bg');
  const ctx    = canvas.getContext('2d');

  let W, H, cx, cy, mouse = { x: -9999, y: -9999 };

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
    cx = W / 2; cy = H / 2;
  }
  window.addEventListener('resize', resize);
  resize();

  window.addEventListener('mousemove', e => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
  });
  window.addEventListener('mouseleave', () => {
    mouse.x = -9999; mouse.y = -9999;
  });

  /* ─── Stars ─── */
  const STAR_COUNT = 340;
  const stars = [];

  function mkStar() {
    const angle  = Math.random() * Math.PI * 2;
    const radius = 300 + Math.random() * (Math.max(W, H) * 0.85);
    return {
      ox: cx + Math.cos(angle) * radius,
      oy: cy + Math.sin(angle) * radius,
      x: 0, y: 0,
      size: 0.4 + Math.random() * 1.6,
      speed: 0.12 + Math.random() * 0.35,
      opacity: 0.3 + Math.random() * 0.7,
      twinkle: Math.random() * Math.PI * 2,
      twinkleSpeed: 0.005 + Math.random() * 0.025,
      trail: [],
    };
  }

  for (let i = 0; i < STAR_COUNT; i++) {
    const s = mkStar();
    s.x = s.ox;
    s.y = s.oy;
    stars.push(s);
  }

  /* ─── Render loop ─── */
  let frame = 0;

  function draw() {
    frame++;
    const t = frame / 60;
    ctx.clearRect(0, 0, W, H);

    /* ── Deep space background ── */
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);
    const nebGrad = ctx.createRadialGradient(cx, cy * 0.55, 0, cx, cy, Math.max(W, H) * 0.9);
    nebGrad.addColorStop(0,    'rgba(28,10,3,1)');
    nebGrad.addColorStop(0.25, 'rgba(10,4,1,1)');
    nebGrad.addColorStop(0.6,  'rgba(3,1,0,1)');
    nebGrad.addColorStop(1,    'rgba(0,0,0,1)');
    ctx.fillStyle = nebGrad;
    ctx.fillRect(0, 0, W, H);

    /* ── Mouse interaction ── */
    const mDist   = Math.hypot(mouse.x - cx, mouse.y - cy) || 9999;
    const mAngle  = Math.atan2(mouse.y - cy, mouse.x - cx); /* angle to mouse from center */
    const mProx   = Math.max(0, 1 - mDist / 520);           /* 0 = far, 1 = at center */
    const mNear   = Math.max(0, 1 - mDist / 300);           /* tighter zone */

    /* ── Event horizon radius — wobbles; amplifies near mouse ── */
    const ehBase = 240;
    const wobAmp = 1 + mNear * 1.6;  /* mouse proximity boosts wobble amplitude */
    const ehR = ehBase
      + (8 * wobAmp) * Math.sin(t * 1.7)
      + (4 * wobAmp) * Math.sin(t * 3.1 + 1.0)
      + (2 * wobAmp) * Math.sin(t * 5.3 + 2.4);

    /* ── Stars pulled into the black hole ── */
    for (const s of stars) {
      const dx = cx - s.x, dy = cy - s.y;
      const dist = Math.sqrt(dx*dx + dy*dy) || 1;

      const grav = (20000 / (dist * dist)) * s.speed;
      s.x += dx / dist * grav;
      s.y += dy / dist * grav;

      const mdx = mouse.x - s.x, mdy = mouse.y - s.y;
      const mdist = Math.sqrt(mdx*mdx + mdy*mdy) || 1;
      if (mdist < 180) {
        s.x += (mdx / mdist) * (1 - mdist / 180) * 0.8;
        s.y += (mdy / mdist) * (1 - mdist / 180) * 0.8;
      }

      s.trail.push({ x: s.x, y: s.y });
      if (s.trail.length > 8) s.trail.shift();

      if (dist < ehR + 14) {
        const ns = mkStar();
        Object.assign(s, { ox: ns.ox, oy: ns.oy, x: ns.ox, y: ns.oy,
          size: ns.size, speed: ns.speed, opacity: ns.opacity,
          twinkle: ns.twinkle, twinkleSpeed: ns.twinkleSpeed, trail: [] });
        continue;
      }

      s.twinkle += s.twinkleSpeed;
      const op = s.opacity * (0.6 + 0.4 * (0.5 + 0.5 * Math.sin(s.twinkle)));

      if (s.trail.length > 1) {
        ctx.beginPath();
        ctx.moveTo(s.trail[0].x, s.trail[0].y);
        for (let i = 1; i < s.trail.length; i++) ctx.lineTo(s.trail[i].x, s.trail[i].y);
        ctx.strokeStyle = `rgba(255,220,160,${op * 0.18})`;
        ctx.lineWidth = s.size * 0.5;
        ctx.stroke();
      }
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,245,200,${op})`;
      ctx.fill();
    }

    /* ─── Disk constants ─── */
    const scY   = 0.07;           /* vertical squeeze — razor-thin edge-on disk */
    const dOR   = ehBase * 3.4;   /* outer disk radius */
    const dIR   = ehBase * 1.02;  /* inner edge — just outside the EH */
    const pulse = 1 + 0.14 * Math.sin(t * 0.9 + 0.3);

    /* ── Flat disk-wing background glow (extends far as wide "wings") ── */
    ctx.save();
    ctx.translate(cx, cy);
    ctx.scale(1, 0.045);  /* extremely flat */
    const wingG = ctx.createRadialGradient(0, 0, dIR * 0.9, 0, 0, dOR * 2.4);
    wingG.addColorStop(0,    'rgba(0,0,0,0)');
    wingG.addColorStop(0.10, 'rgba(155,72,10,0.22)');
    wingG.addColorStop(0.40, 'rgba(195,105,16,0.12)');
    wingG.addColorStop(0.72, 'rgba(125,58,5,0.06)');
    wingG.addColorStop(1,    'rgba(0,0,0,0)');
    ctx.beginPath();
    ctx.arc(0, 0, dOR * 2.4, 0, Math.PI * 2);
    ctx.fillStyle = wingG;
    ctx.fill();
    ctx.restore();

    /* ─── annulus(): draw one disk layer — call from inside translate+scale block ─── */
    function annulus(outerR, innerR, alpha) {
      ctx.beginPath();
      ctx.arc(0, 0, outerR, 0, Math.PI * 2);
      ctx.arc(0, 0, innerR, 0, Math.PI * 2, true);
      const g = ctx.createRadialGradient(0, 0, innerR * 0.88, 0, 0, outerR);
      g.addColorStop(0,    `rgba(255,253,215,${alpha})`);       /* white-hot inner edge */
      g.addColorStop(0.04, `rgba(255,235,125,${alpha * 0.90})`);
      g.addColorStop(0.18, `rgba(255,170,40,${alpha * 0.68})`);
      g.addColorStop(0.42, `rgba(210,115,17,${alpha * 0.38})`);
      g.addColorStop(0.74, `rgba(140,60,7,${alpha * 0.16})`);
      g.addColorStop(1,    'rgba(0,0,0,0)');
      ctx.fillStyle = g;
      ctx.fill('evenodd');
    }

    /* ════════════════════════════════════════════════════════
       BACK DISK — BH covers the equatorial region;
       thin lensed arcs remain visible at top/bottom of BH
       ════════════════════════════════════════════════════════ */
    ctx.save();
    ctx.translate(cx, cy);
    ctx.scale(1, scY);

    /* Base annular passes: outermost to innermost */
    annulus(dOR * 2.0, dIR * 0.93, 0.06 * pulse);
    annulus(dOR * 1.55,dIR * 0.93, 0.16 * pulse);
    annulus(dOR * 1.22,dIR * 0.93, 0.35 * pulse);
    annulus(dOR * 1.0, dIR * 0.93, 0.62 * pulse);

    /* Doppler beaming: bright side always faces the mouse (or left by default) */
    {
      const beamA = mProx > 0.02 ? mAngle : Math.PI; /* track mouse or default left */
      ctx.save();
      ctx.rotate(beamA);                               /* rotate so "right" = mouse direction */
      ctx.beginPath();
      ctx.rect(0, -dOR * 15, dOR * 3.5, dOR * 30);   /* right half = toward mouse */
      ctx.clip();
      annulus(dOR * 1.0, dIR * 0.93, (0.50 + mProx * 0.30) * pulse);
      annulus(dOR * 0.55,dIR * 0.93, (0.28 + mProx * 0.18) * pulse);
      ctx.restore();
    }

    ctx.restore(); /* ─── end back disk ─── */

    /* ════════════════════════════════════════════════════════
       EVENT HORIZON — solid black sphere
       ════════════════════════════════════════════════════════ */
    ctx.beginPath();
    ctx.arc(cx, cy, ehR, 0, Math.PI * 2);
    ctx.fillStyle = '#000';
    ctx.fill();

    /* ════════════════════════════════════════════════════════
       GRAVITATIONAL LENSING ARC
       The back disk's light bent over the top of the BH.
       Appears as a thin glowing crescent directly above EH.
       ════════════════════════════════════════════════════════ */
    {
      ctx.save();
      ctx.translate(cx, cy);
      const lR = ehBase + 6;
      /* flicker + mouse proximity brightens the arc */
      const lF = (0.58 + 0.32 * Math.sin(t * 2.0)) * (1 + mNear * 0.55);
      ctx.lineCap = 'round';

      /* outer soft halo */
      ctx.beginPath();
      ctx.arc(0, 0, lR, 0.32, Math.PI - 0.32, true);
      ctx.strokeStyle = `rgba(200,118,14,${Math.min(1, lF * 0.28)})`;
      ctx.lineWidth = 32 + mNear * 14;
      ctx.stroke();

      /* warm mid glow */
      ctx.beginPath();
      ctx.arc(0, 0, lR, 0.18, Math.PI - 0.18, true);
      ctx.strokeStyle = `rgba(255,192,50,${Math.min(1, lF * 0.58)})`;
      ctx.lineWidth = 12 + mNear * 8;
      ctx.stroke();

      /* white-hot hairline */
      ctx.beginPath();
      ctx.arc(0, 0, lR, 0.06, Math.PI - 0.06, true);
      ctx.strokeStyle = `rgba(255,252,180,${Math.min(1, lF * 0.96)})`;
      ctx.lineWidth = 2 + mNear * 2;
      ctx.stroke();

      ctx.restore();
    }

    /* ════════════════════════════════════════════════════════
       FRONT DISK — same disk, clipped below center
       Appears as a bright horizontal stripe crossing the BH
       ════════════════════════════════════════════════════════ */
    ctx.save();
    ctx.translate(cx, cy);
    ctx.scale(1, scY);

    ctx.beginPath();
    ctx.rect(-W * 3, 1, W * 6, H * 10); /* clip to bottom half (in front of BH) */
    ctx.clip();

    annulus(dOR * 2.0, dIR * 0.95, 0.10 * pulse);
    annulus(dOR * 1.55,dIR * 0.95, 0.26 * pulse);
    annulus(dOR * 1.22,dIR * 0.95, 0.56 * pulse);
    annulus(dOR * 1.0, dIR * 0.95, 0.92 * pulse);

    /* Doppler beaming on front disk — tracks mouse side */
    {
      const beamA = mProx > 0.02 ? mAngle : Math.PI;
      ctx.save();
      ctx.rotate(beamA);
      ctx.beginPath();
      ctx.rect(0, 0, dOR * 3.5, dOR * 15); /* right+bottom quadrant = toward mouse */
      ctx.clip();
      annulus(dOR * 1.0, dIR * 0.95, (0.55 + mProx * 0.30) * pulse);
      ctx.restore();
    }

    ctx.restore(); /* ─── end front disk ─── */

    /* ── Photon ring — brightens when mouse is near the EH edge ── */
    const pa = Math.min(1, (0.46 + 0.28 * Math.sin(t * 2.3)) * (1 + mNear * 0.7));
    const pg = ctx.createRadialGradient(cx, cy, ehR - 1, cx, cy, ehR + 16);
    pg.addColorStop(0,    `rgba(255,252,148,${pa})`);
    pg.addColorStop(0.38, `rgba(255,182,36,${pa * 0.46})`);
    pg.addColorStop(0.78, `rgba(182,96,12,${pa * 0.16})`);
    pg.addColorStop(1,    'rgba(0,0,0,0)');
    ctx.beginPath();
    ctx.arc(cx, cy, ehR + 16, 0, Math.PI * 2);
    ctx.arc(cx, cy, ehR - 1,  0, Math.PI * 2, true);
    ctx.fillStyle = pg;
    ctx.fill('evenodd');

    requestAnimationFrame(draw);
  }

  draw();
</script>
</body>
</html>
